{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>about</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:hwb(138 0% 96% / 0.955);
    font-family:Arial,sans-serif;
}

/* NAVBAR */
nav{
    width:100%;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
}

nav h2{
    color:#22c55e;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.nav-links a:hover{
    color:#22c55e;
}

/* MAIN CENTER */
.main{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.container{
    perspective:1500px;
}

.card{
    width:500px;
    background:#111;
    padding:60px;
    border-radius:20px;
    text-align:center;
    color:#fff;
    transition:0.5s;
    transform-style:preserve-3d;
    box-shadow:0 80px 80px rgba(0,0,0,0.4);
}

.container:hover .card{
    transform:rotateY(15deg) rotateX(10deg) scale(1.05);
}

.card img{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:15px;
    transform:translateZ(40px);
}

.card h1{
    transform:translateZ(30px);
    margin-bottom:px;
}

.card p{
    transform:translateZ(20px);
    font-size:14px;
    margin-bottom:40px;
}

.card a{
    color:#22c55e;
    text-decoration:none;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2>CodingHub</h2>
    <div class="nav-links">
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="container">
        <div class="card">
            <img src="{% static 'images/photo.jpg' %}" alt="profile">

            <h1>SANJEEV KUMAR</h1>
            <p>Web Developer</p>

            <p>
                I am a passionate developer skilled in Python, Django, Docker,
                Git, GitHub, and Data Science.
            </p>

            <p>📞 <a href="tel:+918881607717">+91 8881607717</a></p>
            <p>📧 <a href="mailto:skkumar@888160.com">skkumar@888160.com</a></p>
        </div>
    </div>
</div>

</body>
</html>
