{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    perspective: 1000px;
}

/* Bigger Card */
.card {
    width: 420px;
    padding: 45px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.95);
    box-shadow: 
        0 20px 50px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    transition: 0.5s;
}

.card:hover {
    transform: rotateY(8deg) rotateX(5deg);
}

h2 {
    text-align: center;
    color: #e2e8f0;
    margin-bottom: 30px;
    font-size: 26px;
}

/* Inputs */
.input-group {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 15px;
    box-shadow: inset 2px 2px 6px #000,
                inset -2px -2px 6px #2a3a55;
}

input::placeholder {
    color: #94a3b8;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
    transform: scale(1.04);
}

/* Footer */
.footer {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
}

.footer a {
    color: #3b82f6;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h2>Login</h2>

        <form method="POST"{% url 'login' %}">
            {% csrf_token %}
            {% for message in messages %}
            <p style="color: #2563eb;">{{ message }}</p>
            {% endfor %}
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>

            <div class="footer">
                Don't have an account? <a href="{% url 'register' %}">Register</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
