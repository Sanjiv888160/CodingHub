{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#0f172a;
}

/* NAVBAR */
nav{
    width:100%;
    background:hsl(210, 100%, 1%);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h2{
    color:white;
}

.nav-links a{
    color:#e2e8f0;
    margin-left:20px;
    text-decoration:none;
}

.nav-links a:hover{
    color:hwb(204 0% 98%);
}

/* CENTER CONTENT */
.main{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    width:380px;
    padding:35px;
    border-radius:15px;
    background:#1e293b;
}

.card h2{
    color:#e2e8f0;
    text-align:center;
    margin-bottom:80px;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.footer{
    margin-top:15px;
    text-align:center;
    color:#94a3b8;
}

.footer a{
    color:#3b82f6;
    text-decoration:none;
}
</style>

</head>
<body>

<nav>
    <h2>CodingHub</h2>
    <div class="nav-links">
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</nav>

<div class="main">\
    <div class="card">
        <h2>Login</h2>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% for message in messages %}

                <p style="color:#60a5fa;text-align:center;">{{ message }}</p>
            {% endfor %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <div class="footer">
                Don't have an account? 
                <a href="{% url 'register' %}">Register</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
